<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drug Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Drug Classifier</h1>
</header>

<div id="error-banner"></div>

<div class="layout">

  <!-- Left: sticky pool -->
  <div class="pool-wrapper">
    <div class="pool" id="pool"></div>
    <button id="reset-btn" onclick="initGame()">↺ Reinitialise</button>
  </div>

  <!-- Right: scrollable category grid -->
  <div class="grid-wrapper">
    <div class="grid" id="grid"></div>
  </div>

</div>

<script>
// ── Subsection config ──────────────────────────────────────────
const SUBSECTIONS = [
  { id: 'drugs',        label: 'Drugs',        key: 'drugs'        },
  { id: 'target',       label: 'Target',       key: 'targets'      },
  { id: 'side-effects', label: 'Side Effects', key: 'side_effects' },
  { id: 'risks',        label: 'Risks',        key: 'risks'        },
  { id: 'notes',        label: 'Notes',        key: 'notes'        },
];

// ── State ──────────────────────────────────────────────────────
let allItems   = [];
let placedLog  = {};
let draggingId = null;

// ── Parse JSON into flat items ─────────────────────────────────
function parseData(categories) {
  const itemMap = {};

  categories.forEach(cat => {
    SUBSECTIONS.forEach(sub => {
      const entries = cat[sub.key] || [];
      entries.forEach(raw => {
        const match = raw.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
        const label = match ? match[1].trim() : raw.trim();
        const hint  = match ? match[2].trim() : null;

        const key = `${label.toLowerCase()}|${sub.id}`;
        if (!itemMap[key]) {
          itemMap[key] = {
            id:          key.replace(/[^a-z0-9]/g, '-'),
            label,
            hint,
            type:        sub.id,
            correctCats: new Set(),
          };
        }
        itemMap[key].correctCats.add(cat.id);
      });
    });
  });

  return Object.values(itemMap);
}

// ── Build category grid ────────────────────────────────────────
function buildGrid(categories) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  categories.forEach(cat => {
    const box = document.createElement('div');
    box.className = 'category';
    box.id = 'cat-' + cat.id;

    const subsHtml = SUBSECTIONS.map(sub => `
      <div class="subsection">
        <div class="sub-label">${sub.label}</div>
        <div class="sub-pills"
             id="pills-${cat.id}-${sub.id}"
             data-cat="${cat.id}"
             data-sub="${sub.id}"></div>
      </div>
    `).join('');

    box.innerHTML = `<div class="cat-title">${cat.label}</div>${subsHtml}`;
    grid.appendChild(box);
  });

  document.querySelectorAll('.sub-pills').forEach(zone => {
    zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      handleDrop(zone.dataset.cat, zone.dataset.sub);
    });
  });
}

// ── Build pool ─────────────────────────────────────────────────
function buildPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '<div class="pool-header">[ Item Pool ]</div>';

  // Absorb dragover on the pool itself so the browser doesn't
  // apply its default drag-highlight border to the container.
  // We use preventDefault (not stopPropagation) so drop zones
  // in the grid still work fine.
  pool.addEventListener('dragover',  e => e.preventDefault());
  pool.addEventListener('dragenter', e => e.preventDefault());

  SUBSECTIONS.forEach(sub => {
    const group = shuffle(allItems.filter(i => i.type === sub.id));
    if (group.length === 0) return;

    const section = document.createElement('div');
    section.className = 'pool-section';
    section.innerHTML = `<div class="pool-section-label">${sub.label}</div>`;

    const row = document.createElement('div');
    row.className = 'pool-row';
    group.forEach(item => row.appendChild(makePill(item)));

    section.appendChild(row);
    pool.appendChild(section);
  });
}

function makePill(item) {
  const pill = document.createElement('div');
  pill.className   = 'drug-pill';
  pill.id          = 'pill-' + item.id;
  pill.draggable   = true;
  pill.textContent = item.label;

  if (item.correctCats.size > 1) {
    const badge = document.createElement('span');
    badge.className   = 'remaining-badge';
    badge.textContent = item.correctCats.size;
    pill.appendChild(badge);
  }

  pill.addEventListener('dragstart', () => draggingId = item.id);
  pill.addEventListener('dragend',   () => draggingId = null);
  return pill;
}

// ── Drop logic ─────────────────────────────────────────────────
function handleDrop(catId, subId) {
  if (!draggingId) return;
  const item = allItems.find(i => i.id === draggingId);
  if (!item) return;
  const pill = document.getElementById('pill-' + item.id);
  if (!pill) return;

  const slotKey = `${catId}|${subId}`;

  if (!item.correctCats.has(catId) || item.type !== subId) {
    pill.classList.remove('shake');
    void pill.offsetWidth;
    pill.classList.add('shake');
    setTimeout(() => pill.classList.remove('shake'), 500);
    return;
  }

  if (placedLog[item.id] && placedLog[item.id].has(slotKey)) return;

  if (!placedLog[item.id]) placedLog[item.id] = new Set();
  placedLog[item.id].add(slotKey);

  const placed = document.createElement('span');
  placed.className = 'placed-pill';
  placed.innerHTML = item.hint
    ? `${item.label} <span class="hint">(${item.hint})</span>`
    : item.label;
  document.getElementById(`pills-${catId}-${subId}`).appendChild(placed);

  const remaining = item.correctCats.size - placedLog[item.id].size;
  if (remaining <= 0) {
    pill.remove();
  } else {
    const badge = pill.querySelector('.remaining-badge');
    if (badge) badge.textContent = remaining;
  }

  checkComplete();
}

// ── Completion check ───────────────────────────────────────────
function checkComplete() {
  if (document.querySelectorAll('#pool .drug-pill').length === 0) {
    document.getElementById('pool').innerHTML =
      '<div class="success-msg">All correct</div>';
    document.getElementById('reset-btn').style.display = 'block';
    startWinAnimation();
  }
}

// ── Win animation ──────────────────────────────────────────────
function startWinAnimation() {
  const cats = document.querySelectorAll('.category');
  const colors = ['#7FDBFF','#a78bfa','#34d399','#f472b6','#fbbf24','#60a5fa','#f87171'];
  cats.forEach((cat, i) => {
    const color = colors[i % colors.length];
    const delay = (Math.random() * 0.6).toFixed(2);
    const duration = (0.8 + Math.random() * 0.7).toFixed(2);
    cat.style.setProperty('--flicker-color', color);
    cat.style.animationDelay = delay + 's';
    cat.style.animationDuration = duration + 's';
    cat.classList.add('win-flicker');
  });
}

// ── Helpers ────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.style.display = 'block';
}

// ── Init ───────────────────────────────────────────────────────
async function initGame() {
  placedLog  = {};
  draggingId = null;
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('error-banner').style.display = 'none';

  let categories;
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    categories = await res.json();
  } catch (err) {
    showError(
      `⚠ Could not load <code>data.json</code>.<br>
      Browsers block local file fetches — run a server instead:<br>
      <code>npx serve .</code> &nbsp;or&nbsp; <code>python3 -m http.server</code>`
    );
    return;
  }

  allItems = parseData(categories);
  buildGrid(categories);
  buildPool();
}

initGame();
</script>
</body>
</html>
