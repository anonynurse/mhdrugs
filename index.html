<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drug Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Force landscape on mobile ── */
    @media screen and (max-width: 768px) and (orientation: portrait) {
      #rotate-msg { display: flex !important; }
      body > *:not(#rotate-msg) { display: none !important; }
    }

    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #020d14;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #7FDBFF;
      font-family: 'Share Tech Mono', monospace;
      text-align: center;
      padding: 30px;
    }

    #rotate-msg .rotate-icon {
      font-size: 3rem;
      animation: rotateHint 2s ease-in-out infinite;
    }

    @keyframes rotateHint {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(90deg); }
    }

    #rotate-msg p {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4aa8c8;
    }

    /* ── Mobile tap styles ── */
    @media screen and (max-width: 768px) {
      .drug-pill.tap-selected {
        background: rgba(127,219,255,0.3) !important;
        border-color: #7FDBFF !important;
        box-shadow: 0 0 16px rgba(127,219,255,0.6) !important;
        transform: scale(1.08);
      }
      .sub-pills.tap-target {
        border-color: #7FDBFF88 !important;
        background: rgba(127,219,255,0.06) !important;
      }
    }

    /* ── Nested sub-zone ── */
    .nested-zone-wrapper {
      margin-top: 3px;
      margin-left: 6px;
      border-left: 1px solid #1a5a7a;
      padding-left: 6px;
    }

    .nested-zone-label {
      font-size: 0.38rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3a8aaa;
      margin-bottom: 2px;
      margin-top: 2px;
    }

    .drug-pill.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .drug-pill.locked:hover {
      transform: none;
      border-color: #2a7a9a;
      box-shadow: none;
      background: rgba(127,219,255,0.06);
    }
  </style>
</head>
<body>

<div id="rotate-msg">
  <div class="rotate-icon">&#x21BA;</div>
  <p>Please rotate your device to landscape mode</p>
</div>

<header>
  <h1>Drug Classifier</h1>
</header>

<div id="error-banner"></div>

<div class="layout">
  <div class="pool-wrapper">
    <div class="pool" id="pool"></div>
    <button id="reset-btn" onclick="initGame()">↺ Reinitialise</button>
  </div>
  <div class="grid-wrapper">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
// ── Pool grouping config ───────────────────────────────────────
const POOL_GROUPS = [
  {
    poolLabel: 'Signs Of Toxicity',
    keys: ['signs of toxicity - early', 'signs of toxicity - late'],
  },
];

// ── Pool section order ─────────────────────────────────────────
const POOL_SECTION_ORDER = [
  'Drugs', 'Targets', 'Mechanism', 'Side Effects',
  'Risks', 'Signs Of Toxicity', 'Signs', 'Notes',
];

// ── Key helpers ────────────────────────────────────────────────
function keyToId(key) {
  return key.toLowerCase().replace(/[^a-z0-9]+/g, '-');
}

function keyToLabel(key) {
  return key.replace(/[-_]/g, ' ')
            .split(' ')
            .map(w => w.charAt(0).toUpperCase() + w.slice(1))
            .join(' ');
}

function poolLabelFor(key) {
  const group = POOL_GROUPS.find(g => g.keys.includes(key));
  return group ? group.poolLabel : keyToLabel(key);
}

function subsectionsFor(cat) {
  return Object.keys(cat)
    .filter(k => k !== 'id' && k !== 'label')
    .map(key => ({ id: keyToId(key), label: keyToLabel(key), key }));
}

// ── State ──────────────────────────────────────────────────────
let allItems     = [];   // flat list of all draggable items
let placedLog    = {};   // itemId -> Set of "catId|subId" placed
let unlockedLog  = {};   // parentItemId -> Set of "catId|subId" where children are unlocked
let draggingId   = null;
let selectedPill = null;

const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

// ── Parse JSON ─────────────────────────────────────────────────
// Entries can be:
//   "plain string"
//   { "label": "Parent", "signs": ["child1", "child2"], "otherKey": [...] }
// Children get parentId set so they know who unlocks them.

function parseData(categories) {
  const itemMap = {};

  function addItem(label, hint, typeId, typeKey, poolLabel, catId, parentId) {
    const itemKey = `${label.toLowerCase()}|${typeId}` + (parentId ? `|child-of-${parentId}` : '');
    const id = itemKey.replace(/[^a-z0-9]/g, '-');
    if (!itemMap[itemKey]) {
      itemMap[itemKey] = {
        id, label, hint,
        type: typeId,
        typeKey,
        poolLabel,
        correctCats: new Set(),
        parentId: parentId || null,   // null = top-level, string = locked until parent placed
        children: [],                 // nested sub-items keyed by "nestedTypeId"
      };
    }
    itemMap[itemKey].correctCats.add(catId);
    return id;
  }

  categories.forEach(cat => {
    subsectionsFor(cat).forEach(sub => {
      const entries = cat[sub.key] || [];
      entries.forEach(raw => {

        if (typeof raw === 'string') {
          // Plain item
          const match = raw.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
          const label = match ? match[1].trim() : raw.trim();
          const hint  = match ? match[2].trim() : null;
          addItem(label, hint, sub.id, sub.key, poolLabelFor(sub.key), cat.id, null);

        } else if (typeof raw === 'object' && raw.label) {
          // Nested parent item
          const parentLabel = raw.label;
          const parentId = addItem(parentLabel, null, sub.id, sub.key, poolLabelFor(sub.key), cat.id, null);

          // Each key besides "label" becomes a nested sub-section
          Object.keys(raw).filter(k => k !== 'label').forEach(nestedKey => {
            const nestedSub = { id: keyToId(nestedKey), label: keyToLabel(nestedKey), key: nestedKey };
            const nestedEntries = raw[nestedKey] || [];
            nestedEntries.forEach(childRaw => {
              const match = typeof childRaw === 'string' && childRaw.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
              const childLabel = match ? match[1].trim() : String(childRaw).trim();
              const childHint  = match ? match[2].trim() : null;
              // Children use "Signs" as their pool section label
              const childId = addItem(childLabel, childHint, nestedSub.id, nestedSub.key, keyToLabel(nestedKey), cat.id, parentId);
              // Register the child under the parent
              const parentItem = itemMap[Object.keys(itemMap).find(k => itemMap[k].id === parentId)];
              if (parentItem) {
                if (!parentItem.children.find(c => c.typeId === nestedSub.id)) {
                  parentItem.children.push({ typeId: nestedSub.id, typeLabel: nestedSub.label });
                }
              }
            });
          });
        }
      });
    });
  });

  return Object.values(itemMap);
}

// ── Build category grid ────────────────────────────────────────
function buildGrid(categories) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  categories.forEach(cat => {
    const box = document.createElement('div');
    box.className = 'category';
    box.id = 'cat-' + cat.id;

    const subsHtml = subsectionsFor(cat).map(sub => `
      <div class="subsection">
        <div class="sub-label">${sub.label}</div>
        <div class="sub-pills"
             id="pills-${cat.id}-${sub.id}"
             data-cat="${cat.id}"
             data-sub="${sub.id}"></div>
      </div>
    `).join('');

    box.innerHTML = `<div class="cat-title">${cat.label}</div>${subsHtml}`;
    grid.appendChild(box);
  });

  attachDropZoneListeners();
}

function attachDropZoneListeners() {
  document.querySelectorAll('.sub-pills').forEach(zone => {
    if (zone.dataset.listenersAttached) return;
    zone.dataset.listenersAttached = 'true';

    zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      handleDrop(zone.dataset.cat, zone.dataset.sub, zone.dataset.parentItemId || null);
    });

    zone.addEventListener('click', () => {
      if (!isMobile() || !selectedPill) return;
      document.querySelectorAll('.sub-pills').forEach(z => z.classList.remove('tap-target'));
      selectedPill.classList.remove('tap-selected');
      handleDrop(zone.dataset.cat, zone.dataset.sub, zone.dataset.parentItemId || null);
      selectedPill = null;
    });
  });
}

// ── Build pool ─────────────────────────────────────────────────
function buildPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '<div class="pool-header">[ Item Pool ]</div>';
  pool.addEventListener('dragover',  e => e.preventDefault());
  pool.addEventListener('dragenter', e => e.preventDefault());

  const sectionMap = new Map();
  allItems.forEach(item => {
    if (!sectionMap.has(item.poolLabel)) sectionMap.set(item.poolLabel, []);
    sectionMap.get(item.poolLabel).push(item);
  });

  const sections = [...sectionMap.entries()].sort(([a], [b]) => {
    const ai = POOL_SECTION_ORDER.indexOf(a);
    const bi = POOL_SECTION_ORDER.indexOf(b);
    return (ai === -1 ? Infinity : ai) - (bi === -1 ? Infinity : bi);
  });

  sections.forEach(([label, items]) => {
    const section = document.createElement('div');
    section.className = 'pool-section';
    section.innerHTML = `<div class="pool-section-label">${label}</div>`;
    const row = document.createElement('div');
    row.className = 'pool-row';
    shuffle(items).forEach(item => row.appendChild(makePill(item)));
    section.appendChild(row);
    pool.appendChild(section);
  });
}

function makePill(item) {
  const pill = document.createElement('div');
  pill.className = 'drug-pill';
  pill.id = 'pill-' + item.id;
  pill.draggable = true;
  pill.textContent = item.label;

  if (item.correctCats.size > 1) {
    const badge = document.createElement('span');
    badge.className = 'remaining-badge';
    badge.textContent = item.correctCats.size;
    pill.appendChild(badge);
  }

  pill.addEventListener('dragstart', () => {
    draggingId = item.id;
  });
  pill.addEventListener('dragend', () => draggingId = null);

  pill.addEventListener('click', () => {
    if (!isMobile()) return;
    if (selectedPill === pill) {
      pill.classList.remove('tap-selected');
      selectedPill = null;
      return;
    }
    if (selectedPill) selectedPill.classList.remove('tap-selected');
    selectedPill = pill;
    draggingId = item.id;
    pill.classList.add('tap-selected');
    document.querySelectorAll('.sub-pills').forEach(z => z.classList.add('tap-target'));
  });

  return pill;
}

// ── Check if parent is placed in a specific category ──────────
function isParentPlacedInCat(item, catId) {
  if (!item.parentId) return true;
  return !!document.querySelector(`.placed-pill[data-item-id="${item.parentId}"][data-cat="${catId}"]`);
}

// ── Check if parent placed in any category (for unlocking pill) ──
function isParentPlaced(item) {
  if (!item.parentId) return true;
  return !!document.querySelector(`.placed-pill[data-item-id="${item.parentId}"]`);
}

// ── Reveal children after parent placed ───────────────────────
function revealChildren(parentItem, catId) {
  // For each nested type under this parent, inject a sub-zone into the placed pill's slot
  if (!parentItem.children.length) return;

  // Find the placed-pill element we just added
  const placedEl = document.querySelector(`.placed-pill[data-item-id="${parentItem.id}"][data-cat="${catId}"]`);
  if (!placedEl) return;

  const wrapper = document.createElement('div');
  wrapper.className = 'nested-zone-wrapper';

  parentItem.children.forEach(child => {
    const zoneId = `nested-${catId}-${child.typeId}-${parentItem.id}`;
    const zoneDiv = document.createElement('div');
    zoneDiv.innerHTML = `
      <div class="nested-zone-label">${parentItem.label} — ${child.typeLabel}</div>
      <div class="sub-pills"
           id="${zoneId}"
           data-cat="${catId}"
           data-sub="${child.typeId}"
           data-parent-item-id="${parentItem.id}"></div>
    `;
    wrapper.appendChild(zoneDiv);
  });

  placedEl.insertAdjacentElement('afterend', wrapper);
  attachDropZoneListeners();

  // Unlock matching child pills in the pool
  allItems
    .filter(i => i.parentId === parentItem.id && i.correctCats.has(catId))
    .forEach(child => {
      const pill = document.getElementById('pill-' + child.id);
      if (pill) {
        pill.classList.remove('locked');
        pill.draggable = true;
      }
    });
}

// ── Drop logic ─────────────────────────────────────────────────
function handleDrop(catId, subId, parentItemId) {
  if (!draggingId) return;
  const item = allItems.find(i => i.id === draggingId);
  if (!item) return;
  const pill = document.getElementById('pill-' + item.id);
  if (!pill) return;

  // Only two things make a drop correct:
  // 1. The category is one of the item's correct categories
  // 2. The subsection type matches exactly
  const isCorrect = item.correctCats.has(catId) && item.type === subId;

  if (!isCorrect) {
    shake(pill);
    if (!isMobile()) { selectedPill = null; draggingId = null; }
    return;
  }

  // For child items dropped into a nested zone, we also need the
  // parentItemId to match — but this is NOT a shake, just a silent ignore,
  // since the correct cat/type already passed
  const slotKey = `${catId}|${subId}` + (parentItemId ? `|${parentItemId}` : '');
  if (placedLog[item.id] && placedLog[item.id].has(slotKey)) return;
  if (!placedLog[item.id]) placedLog[item.id] = new Set();
  placedLog[item.id].add(slotKey);

  // Place the pill
  const placed = document.createElement('span');
  placed.className = 'placed-pill';
  placed.dataset.itemId = item.id;
  placed.dataset.cat = catId;
  placed.innerHTML = item.hint
    ? `${item.label} <span class="hint">(${item.hint})</span>`
    : item.label;

  const zoneId = parentItemId
    ? `nested-${catId}-${subId}-${parentItemId}`
    : `pills-${catId}-${subId}`;
  const zone = document.getElementById(zoneId);
  if (zone) zone.appendChild(placed);

  // If this parent has children, reveal their nested drop zones
  if (item.children.length) {
    revealChildren(item, catId);
  }

  const remaining = item.correctCats.size - placedLog[item.id].size;
  if (remaining <= 0) {
    pill.remove();
  } else {
    const badge = pill.querySelector('.remaining-badge');
    if (badge) badge.textContent = remaining;
  }

  checkComplete();
}

function shake(pill) {
  pill.classList.remove('shake');
  void pill.offsetWidth;
  pill.classList.add('shake');
  setTimeout(() => pill.classList.remove('shake'), 500);
}

// ── Completion check ───────────────────────────────────────────
function checkComplete() {
  if (document.querySelectorAll('#pool .drug-pill').length === 0) {
    document.getElementById('pool').innerHTML =
      '<div class="success-msg">All correct</div>';
    document.getElementById('reset-btn').style.display = 'block';
    startWinAnimation();
  }
}

// ── Win animation ──────────────────────────────────────────────
function startWinAnimation() {
  document.querySelectorAll('.category').forEach(cat => {
    cat.style.animationDelay    = (Math.random() * 1.5).toFixed(2) + 's';
    cat.style.animationDuration = (2.5 + Math.random() * 1.5).toFixed(2) + 's';
    cat.classList.add('win-flicker');
  });
}

// ── Helpers ────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.style.display = 'block';
}

// ── Init ───────────────────────────────────────────────────────
async function initGame() {
  placedLog   = {};
  unlockedLog = {};
  draggingId  = null;
  selectedPill = null;
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('error-banner').style.display = 'none';

  let categories;
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    categories = await res.json();
  } catch (err) {
    showError(
      `⚠ Could not load <code>data.json</code>.<br>
      Browsers block local file fetches — run a server instead:<br>
      <code>npx serve .</code> &nbsp;or&nbsp; <code>python3 -m http.server</code>`
    );
    return;
  }

  allItems = parseData(categories);
  buildGrid(categories);
  buildPool();
}

initGame();
</script>
</body>
</html>
